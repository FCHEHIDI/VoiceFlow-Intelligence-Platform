[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=70
    --ignore=tests/hardware
    --ignore=tests/fixtures
    --ignore=tests/integration/test_refactoring.py

markers =
    unit: Unit tests with no external services
    integration: Integration tests (needs DB / Redis)
    slow: Slow tests (load, DER)
    hardware: Tests requiring onnxruntime / GPU

[coverage:run]
source = .
omit =
    */tests/*
    */venv/*
    */__pycache__/*
    */site-packages/*
    setup.py
    inference_server.py
    load_test.py
    RESTART_TRAINING.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
